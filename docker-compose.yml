services:
  # PostgreSQL数据库
  postgres:
    image: registry.cn-hangzhou.aliyuncs.com/library/postgres:15-alpine
    container_name: outeye-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-outeye}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-outeye_edu}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - outeye-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-outeye}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis缓存
  redis:
    image: registry.cn-hangzhou.aliyuncs.com/library/redis:7-alpine
    container_name: outeye-redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - outeye-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Qdrant向量数据库
  qdrant:
    image: registry.cn-hangzhou.aliyuncs.com/qdrant/qdrant:v1.7.4
    container_name: outeye-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - outeye-network
    restart: unless-stopped

  # FastAPI后端
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: outeye-backend
    ports:
      - "8000:8000"
    environment:
      - APP_NAME=${APP_NAME:-OutEye Edu}
      - APP_VERSION=${APP_VERSION:-1.0.0}
      - SECRET_KEY=${SECRET_KEY}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-outeye}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-outeye_edu}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_COLLECTION=${QDRANT_COLLECTION:-outeye_knowledge}
      - WIKI_DATA_PATH=/app/OutEye-Wiki
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_PROVIDER=${LLM_PROVIDER:-deepseek}
      - LLM_BASE_URL=${LLM_BASE_URL:-https://api.deepseek.com}
      - LLM_MODEL=${LLM_MODEL:-deepseek-chat}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-bge-small-zh-v1.5}
      - EMBEDDING_DIMENSION=${EMBEDDING_DIMENSION:-512}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - LOG_FILE=${LOG_FILE:-logs/outeye.log}
      - DEBUG=${DEBUG:-false}
    volumes:
      - ${WIKI_HOST_PATH:-../OutEye-Wiki}:/app/OutEye-Wiki:ro
      - backend_uploads:/app/uploads
      - backend_logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    networks:
      - outeye-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # Next.js前端
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: outeye-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost}
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - outeye-network
    restart: unless-stopped

  # Nginx反向代理
  nginx:
    image: registry.cn-hangzhou.aliyuncs.com/library/nginx:alpine
    container_name: outeye-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./docker/nginx/ssl:/etc/nginx/ssl
    depends_on:
      - backend
      - frontend
    networks:
      - outeye-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  backend_uploads:
  backend_logs:

networks:
  outeye-network:
    driver: bridge
